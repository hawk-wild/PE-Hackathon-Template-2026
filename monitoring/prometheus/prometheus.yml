global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: "url-shortener-apps"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "app-1:8000"
          - "app-2:8000"
          - "app-3:8000"
        labels:
          service: "url-shortener"
          environment: "hackathon"

  - job_name: "url-shortener-lb"
    metrics_path: "/health"
    static_configs:
      - targets:
          - "nginx:80"
        labels:
          service: "url-shortener-lb"
          environment: "hackathon"
