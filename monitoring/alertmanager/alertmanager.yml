global:
  resolve_timeout: 5m

route:
  receiver: "default-null"
  group_by: ["alertname", "service"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 2h

  routes:
    - receiver: "platform-critical"
      matchers:
        - severity="critical"
      continue: false

    - receiver: "platform-warning"
      matchers:
        - severity="warning"
      continue: false

receivers:
  - name: "platform-critical"
    slack_configs:
      - api_url: "SLACK_WEBHOOK_URL_PLACEHOLDER"
        channel: "#oncall"
        title: '[CRITICAL] {{ .CommonLabels.alertname }}'
        text: |
          Service: {{ .CommonLabels.service }}
          Summary: {{ .CommonAnnotations.summary }}
          Details: {{ .CommonAnnotations.description }}
        send_resolved: true
    discord_configs:
      - webhook_url: "DISCORD_WEBHOOK_URL_PLACEHOLDER"
        title: '[CRITICAL] {{ .CommonLabels.alertname }}'
        message: |
          Service: {{ .CommonLabels.service }}
          Summary: {{ .CommonAnnotations.summary }}
          Details: {{ .CommonAnnotations.description }}
        send_resolved: true

  - name: "platform-warning"
    slack_configs:
      - api_url: "SLACK_WEBHOOK_URL_PLACEHOLDER"
        channel: "#warnings"
        title: '[WARN] {{ .CommonLabels.alertname }}'
        text: |
          Service: {{ .CommonLabels.service }}
          Summary: {{ .CommonAnnotations.summary }}
          Details: {{ .CommonAnnotations.description }}
        send_resolved: true
    discord_configs:
      - webhook_url: "DISCORD_WEBHOOK_URL_PLACEHOLDER"
        title: '[WARN] {{ .CommonLabels.alertname }}'
        message: |
          Service: {{ .CommonLabels.service }}
          Summary: {{ .CommonAnnotations.summary }}
          Details: {{ .CommonAnnotations.description }}
        send_resolved: true

  - name: "default-null"

inhibit_rules:
  - source_matchers:
      - alertname="ServiceFleetDown"
    target_matchers:
      - alertname="AppInstanceDown"
    equal: ["service"]

  - source_matchers:
      - alertname="LoadBalancerDown"
    target_matchers:
      - alertname="ServiceFleetDown"
    equal: ["service"]
