events {
    worker_connections 8192;
}

http {
    upstream backend_apps {
        least_conn;
        server app-1:8000 max_fails=3 fail_timeout=30s;
        server app-2:8000 max_fails=3 fail_timeout=30s;
        server app-3:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://backend_apps;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location = /health {
            proxy_pass http://backend_apps/health;
            proxy_set_header Host $host;
        }

        location = /metrics {
            default_type text/plain;
            return 200 "nginx_up 1\n";
        }
    }
}
