services:
  db:
    image: postgres:18-alpine
    container_name: hackathon-db
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      network: host
    container_name: hackathon-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "8080:8000"
    restart: unless-stopped

volumes:
  postgres_data:
